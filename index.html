<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="TEK2day dashboard with TradingView, T2D Pulse, CEORater, EDGAR Watcher, Earnings Calendar, and Economic Calendar." />
  
  <title>TEK2day Dash</title>
  <meta property="og:type" content="website" />
  <meta property="og:title" content="TEK2day Dash" />
  <meta property="og:description" content="TEK2day dashboard with TradingView, T2D Pulse, CEORater, EDGAR Watcher, Earnings Calendar, and Economic Calendar." />
  <meta property="og:url" content="https://dash.tek2dayholdings.com/" />
  <meta property="og:image" content="https://dash.tek2dayholdings.com/T2D_Dash_Social_Banner.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="TEK2day Dash overview showing TradingView, T2D Pulse, CEORater, EDGAR Watcher, Earnings Calendar, and Economic Calendar." />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="TEK2day Dash" />
  <meta name="twitter:description" content="TEK2day dashboard with TradingView, T2D Pulse, CEORater, EDGAR Watcher, Earnings Calendar, and Economic Calendar." />
  <meta name="twitter:image" content="https://dash.tek2dayholdings.com/T2D_Dash_Social_Banner.png" />
  <meta name="twitter:image:alt" content="TEK2day Dash overview showing TradingView, T2D Pulse, CEORater, EDGAR Watcher, Earnings Calendar, and Economic Calendar." />

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="icon" href="favicon.ico">

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { color-scheme: dark; }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #000;
      color: #e0e0e0;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .app-header {
      flex: 0 0 auto;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 12px 20px;
      z-index: 50;
    }

    .tabs {
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: 1600px;
      margin: 0 auto;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      white-space: nowrap;
      padding-bottom: 4px;
    }

    .tabs::-webkit-scrollbar {
      display: none;
    }

    .brand {
      display: flex;
      align-items: center;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .brand img {
      height: 32px;
      width: auto;
      border-radius: 6px;
    }

    .tab-button {
      background: transparent;
      color: #888;
      border: 1px solid transparent;
      padding: 8px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .tab-button:hover {
      color: #ccc;
      background: rgba(255, 255, 255, 0.04);
    }

    .tab-button.active {
      background: rgba(37,99,235,0.12);
      color: #2563eb;
      border-color: rgba(37,99,235,0.25);
      font-weight: 600;
    }

    .app-main {
      flex: 1 1 auto;
      position: relative;
      overflow: hidden;
      background: #000;
    }

    .tab-content {
      display: none;
      width: 100%;
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .tab-content.active {
      display: block;
    }

    .iframe-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #000;
    }

    .tab-content.tradingview,
    .tab-content.home {
      background: #000;
    }

    .home-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .home-grid {
      display: grid;
      gap: 20px;
      padding-bottom: 40px;
    }

    @media (min-width: 1024px) {
      .home-grid {
        grid-template-columns: 1.6fr 1fr;
        grid-template-areas:
          "tv    pulse"
          "ceo   fin"
          "econ  tekcal";
        align-items: start;
      }
      .home-tv { grid-area: tv; }
      .home-pulse { grid-area: pulse; }
      .home-ceorater { grid-area: ceo; }
      .home-finmodel { grid-area: fin; }
      .home-econ-calendar { grid-area: econ; }
      .home-tek-calendar { grid-area: tekcal; }
    }

    @media (max-width: 1023.98px) {
      .home-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }
    }

    .home-card {
      background: rgba(22,22,22,0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      height: 500px;
      position: relative;
    }

    .home-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .home-head h2 {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.01em;
    }

    .chip {
      background: rgba(255,255,255,0.06);
      color: #888;
      border: 1px solid rgba(255,255,255,0.06);
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }
    .chip:hover { background: rgba(255,255,255,0.10); color: #ccc; }

    .home-frame {
      flex: 1;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }

    #tv-home-widget { border-radius: 8px; }

    .scale-wrap {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      border-radius: 8px;
    }

    @media (max-width: 768px) {
      .app-header {
        padding: 10px 16px;
      }
      .home-container {
        padding: 12px;
      }
      .home-card {
        height: 400px;
      }
      .tabs {
        gap: 6px;
      }
      .tab-button {
        font-size: 13px;
        padding: 6px 12px;
      }
      .brand img {
        height: 28px;
      }
    }

    #installBanner {
      position: fixed;
      right: 16px;
      bottom: 16px;
      background: rgba(22,22,22,0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.06);
      padding: 12px 16px;
      border-radius: 10px;
      display: none;
      z-index: 1000;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
    }
    #installBanner button {
      background: #4ade80;
      color: #000;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      margin-left: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <header class="app-header">
    <nav class="tabs">
      <div class="brand" aria-label="TEK2day">
        <img src="android-chrome-192x192.png" alt="T2D" loading="lazy">
      </div>
      
      <button class="tab-button active" onclick="switchTab(0)">Home</button>
      <button class="tab-button" onclick="switchTab(1)">TradingView</button>
      <button class="tab-button" onclick="switchTab(2)">Calendar</button>
      <button class="tab-button" onclick="switchTab(3)">EPS</button>
      <button class="tab-button" onclick="window.open('https://pulse.tek2dayholdings.com/', '_blank')">T2D Pulse</button>
      <button class="tab-button" onclick="switchTab(5)">CEORater</button>
      <button class="tab-button" onclick="switchTab(6)">EDGAR Watcher</button>
      <button class="tab-button" onclick="switchTab(7)">Kilby</button>
    </nav>
  </header>

  <main class="app-main">

    <div class="tab-content home active">
      <div class="home-container">
        <div class="home-grid">
          
          <section class="home-card home-tv">
            <div class="home-head">
              <h2>Markets</h2>
              <button class="chip" onclick="switchTab(1)">Open full</button>
            </div>
            <div class="home-frame" style="background:transparent;">
              <div id="tv-home-widget" style="width:100%;height:100%;"></div>
            </div>
          </section>

          <section class="home-card home-pulse">
            <div class="home-head">
              <h2>T2D Pulse</h2>
              <button class="chip" onclick="window.open('https://pulse.tek2dayholdings.com', '_blank')">Open full</button>
            </div>
            <div class="home-frame">
              <iframe id="pulse-iframe" data-src="https://pulse.tek2dayholdings.com" title="T2D Pulse" loading="lazy"></iframe>
            </div>
          </section>

          <section class="home-card home-ceorater">
            <div class="home-head">
              <h2>CEORater</h2>
              <button class="chip" onclick="switchTab(5)">Open full</button>
            </div>
            <div class="home-frame">
              <div class="scale-wrap">
                <iframe id="ceo-home-iframe" data-src="https://ceorater.com" title="CEORater" loading="lazy"></iframe>
              </div>
            </div>
          </section>

          <section class="home-card home-finmodel">
            <div class="home-head">
              <h2>EDGAR Watcher</h2>
              <button class="chip" onclick="switchTab(6)">Open full</button>
            </div>
            <div class="home-frame">
              <iframe data-src="https://edgar.tek2dayholdings.com/" title="EDGAR Watcher" loading="lazy"></iframe>
            </div>
          </section>

          <section class="home-card home-econ-calendar">
            <div class="home-head">
              <h2>Economic Calendar</h2>
              <button class="chip" onclick="switchTab(2)">Open full</button>
            </div>
            <div class="home-frame">
              <div class="tradingview-widget-container" style="width:100%;height:100%;">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                  { "colorTheme": "dark", "isTransparent": false, "locale": "en", "width": "100%", "height": "100%" }
                </script>
              </div>
            </div>
          </section>

          <section class="home-card home-tek-calendar">
            <div class="home-head">
              <h2>Earnings Calendar</h2>
              <button class="chip" onclick="switchTab(3)">Open full</button>
            </div>
            <div class="home-frame">
              <iframe data-src="https://calendar.tek2dayholdings.com/" title="Earnings Calendar" loading="lazy"></iframe>
            </div>
          </section>

        </div>
      </div>
    </div>

    <div class="tab-content tradingview">
      <div id="tradingview-widget" style="width:100%;height:100%;"></div>
    </div>

    <div class="tab-content">
      <div class="iframe-container">
        <div class="tradingview-widget-container" style="width:100%;height:100%;">
          <div class="tradingview-widget-container__widget"></div>
          <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
            { "colorTheme": "dark", "isTransparent": false, "locale": "en", "width": "100%", "height": "100%" }
          </script>
        </div>
      </div>
    </div>

    <div class="tab-content">
      <div class="iframe-container">
        <iframe data-src="https://calendar.tek2dayholdings.com/" title="Earnings Calendar" loading="lazy"></iframe>
      </div>
    </div>

    <div class="tab-content">
      <div class="iframe-container">
        <iframe data-src="https://pulse.tek2dayholdings.com" title="T2D Pulse" loading="lazy"></iframe>
      </div>
    </div>

    <div class="tab-content">
      <div class="iframe-container">
        <iframe data-src="https://ceorater.com" title="CEORater" loading="lazy"></iframe>
      </div>
    </div>

    <div class="tab-content">
      <div class="iframe-container">
        <iframe data-src="https://edgar.tek2dayholdings.com/" title="EDGAR Watcher" loading="lazy"></iframe>
      </div>
    </div>

    <div class="tab-content">
      <div class="iframe-container">
        <iframe data-src="https://agentkilby.com" title="Kilby" loading="lazy"></iframe>
      </div>
    </div>

  </main>

  <div id="installBanner">
    <span>Install App</span>
    <button id="installBtn">Install</button>
  </div>
  
  <div id="updateToast" style="position:fixed;left:50%;transform:translateX(-50%);bottom:20px;background:rgba(22,22,22,0.85);backdrop-filter:blur(8px);color:#fff;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);display:none;z-index:9999">
    Update available. <button id="refreshBtn" style="margin-left:8px;background:#4ade80;color:#000;border:none;border-radius:6px;padding:4px 8px;font-weight:bold;cursor:pointer;">Refresh</button>
  </div>

  <script id="tvjs" src="https://s3.tradingview.com/tv.js" defer></script>
  <script>
    /* --- TRADINGVIEW INIT --- */
    const TVReady = new Promise((resolve) => {
      function check() { if (window.TradingView) resolve(); else setTimeout(check, 100); }
      check();
    });

    let tvHomeInit = false;
    let tvFullInit = false;

    async function initTV(id) {
      await TVReady;
      new TradingView.widget({
        autosize: true,
        container_id: id,
        symbol: 'NASDAQ:AAPL',
        interval: 'D',
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        theme: 'dark',
        style: 1,
        locale: 'en',
        toolbar_bg: '#f1f3f6',
        enable_publishing: false,
        hide_side_toolbar: false,
        allow_symbol_change: true,
        details: true,
        studies: ['MAExp@tv-basicstudies', 'RSI@tv-basicstudies']
      });
    }

    /* --- TABS & NAVIGATION --- */
    function switchTab(index) {
      const tabs = document.querySelectorAll('.tab-content');
      const buttons = document.querySelectorAll('.tab-button');
      
      tabs.forEach(t => t.classList.remove('active'));
      buttons.forEach(b => b.classList.remove('active'));
      
      if(tabs[index]) tabs[index].classList.add('active');
      if(buttons[index]) buttons[index].classList.add('active');

      // Lazy Load Logic
      if (index === 0 && !tvHomeInit) { initTV('tv-home-widget'); tvHomeInit = true; loadHomeFrames(); }
      if (index === 1 && !tvFullInit) { initTV('tradingview-widget'); tvFullInit = true; }
      
      // Load tab iframe if not already loaded
      if (tabs[index]) {
        const iframe = tabs[index].querySelector('iframe[data-src]');
        if (iframe && !iframe.src) {
          iframe.src = iframe.dataset.src;
        }
      }
      
      // Home preview scaler
      if (index === 0) requestAnimationFrame(scaleCeoraterPreview);
    }

    function loadHomeFrames() {
      document.querySelectorAll('.home-frame iframe[data-src]').forEach(f => {
        if (!f.src) f.src = f.dataset.src;
      });
    }

    /* --- MASTER-LEVEL SCALER FOR HOME PREVIEW --- */
    function scaleCeoraterPreview() {
      const wrap = document.querySelector('.scale-wrap');
      const iframe = document.getElementById('ceo-home-iframe');
      if (!wrap || !iframe) return;
      
      // 1. CLEAR ALL PREVIOUS TRANSFORMS
      iframe.style.width = '';
      iframe.style.height = '';
      iframe.style.transform = '';
      iframe.style.transformOrigin = '';
      iframe.style.position = '';
      iframe.style.left = '';
      iframe.style.top = '';
      iframe.style.zoom = '';

      const isDesktop = window.matchMedia('(min-width:1024px)').matches;

      if (isDesktop) {
        iframe.style.width = '100%';
        iframe.style.height = '100%';
        return;
      }

      // 2. DETERMINISTIC MOBILE SCALING
      const virtualWidth = 1280; 
      const availableWidth = wrap.clientWidth;
      const availableHeight = wrap.clientHeight;
      
      const scale = availableWidth / virtualWidth;
      
      iframe.style.width = `${virtualWidth}px`;
      iframe.style.height = `${availableHeight / scale}px`; 
      
      iframe.style.transform = `scale(${scale})`;
      iframe.style.transformOrigin = '0 0';
      iframe.style.position = 'absolute';
      iframe.style.top = '0';
      iframe.style.left = '0';
    }

    /* --- INITIALIZATION --- */
    window.addEventListener('DOMContentLoaded', () => {
      initTV('tv-home-widget');
      tvHomeInit = true;
      loadHomeFrames();
      
      scaleCeoraterPreview();

      // PWA Logic
      let deferredPrompt;
      const installBanner = document.getElementById('installBanner');
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBanner.style.display = 'block';
      });
      document.getElementById('installBtn').addEventListener('click', async () => {
        if(deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt = null;
          installBanner.style.display = 'none';
        }
      });
    });

    let resizeTimer;
    window.addEventListener('resize', () => {
       clearTimeout(resizeTimer);
       resizeTimer = setTimeout(scaleCeoraterPreview, 50);
    });
  </script>
</body>
</html>
